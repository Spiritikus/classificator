<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХимКлассификатор — все группы элементов Менделеева</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0a1420 0%, #060e18 100%);
            font-family: 'Segoe UI', system-ui;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(18, 30, 42, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            border: 1px solid rgba(59, 130, 246, 0.4);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }
        .header-blue {
            background: linear-gradient(95deg, #0f2a38, #0a1f2c);
            border-radius: 1.8rem 1.8rem 0 0;
            border-bottom: 2px solid #3b82f6;
        }
        .btn-analyze {
            background: linear-gradient(95deg, #2563eb, #1e40af);
            border: none;
            font-weight: 600;
        }
        .btn-analyze:hover {
            background: linear-gradient(95deg, #3b82f6, #2563eb);
            transform: translateY(-1px);
        }
        .table-container {
            max-height: 55vh;
            overflow-y: auto;
            border-radius: 1rem;
            background: #0e1722;
        }
        .table {
            color: #eef2ff;
        }
        .table thead th {
            background: #112a38;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid #3b82f6;
        }
        .elem-badge {
            background: #1f6e6a;
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: bold;
            min-width: 70px;
            display: inline-block;
            text-align: center;
        }
        .elem-correct {
            background: #1f6e3a;
        }
        .elem-wrong {
            background: #9b2c2c;
        }
        .stat-panel {
            background: #0d2f2a;
            border-radius: 50px;
            padding: 6px 18px;
        }
        select.form-select {
            background-color: #1a2f3a !important;
            color: white !important;
            border-color: #3b82f6;
        }
    </style>
</head>
<body>

<div class="container py-4 py-md-5">
    <div class="row justify-content-center">
        <div class="col-xl-11 col-lg-11">
            <div class="glass-card overflow-hidden">
                <div class="header-blue p-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h2 class="text-white fw-bold mb-0"><i class="fas fa-chalkboard me-2 text-primary"></i> Менделеев Классификатор</h2>
                            <p class="text-info-emphasis small mt-1">Автоопределение элемента — все группы периодической системы</p>
                        </div>
                        <i class="fas fa-atom fa-3x text-primary opacity-50"></i>
                    </div>
                </div>

                <div class="p-4 p-md-5">
                    <!-- ПРОСТАЯ ЗАГРУЗКА ФАЙЛА -->
                    <div class="mb-4 text-center p-4 rounded-4" style="background: rgba(0,0,0,0.2); border: 1px solid #2d4a6e;">
                        <i class="fas fa-file-excel fa-3x text-primary mb-2"></i>
                        <h5 class="text-white">Загрузите Excel-файл с вопросами</h5>
                        <p class="text-secondary small">.xlsx, .xls</p>
                        <input type="file" id="excelFileInput" accept=".xlsx, .xls, .xlsm" style="display: inline-block;" class="d-inline-block">
                        <div id="uploadStatus" class="mt-3 small fw-bold text-info"></div>
                    </div>

                    <!-- Настройки -->
                    <div class="row g-3 mb-4 align-items-end bg-black bg-opacity-25 p-3 rounded-4">
                        <div class="col-md-4">
                            <label class="form-label text-white fw-semibold"><i class="fas fa-columns"></i> Столбец с вопросами</label>
                            <select id="questionCol" class="form-select" disabled>
                                <option value="auto">🧠 Автоопределение</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-white fw-semibold"><i class="fas fa-check-circle"></i> Столбец с эталоном</label>
                            <select id="answerCol" class="form-select" disabled>
                                <option value="none">📌 Нет эталона</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-white fw-semibold"><i class="fas fa-table"></i> Группа элементов</label>
                            <select id="groupSelect" class="form-select">
                                <option value="auto">🎯 Авто (по контексту)</option>
                                <option value="1">1 группа: H, Li, Na, K, Rb, Cs, Fr (щелочные)</option>
                                <option value="2">2 группа: Be, Mg, Ca, Sr, Ba, Ra (щелочноземельные)</option>
                                <option value="13">13 группа: B, Al, Ga, In, Tl</option>
                                <option value="14">14 группа: C, Si, Ge, Sn, Pb</option>
                                <option value="15">15 группа: N, P, As, Sb, Bi</option>
                                <option value="16">16 группа: O, S, Se, Te, Po</option>
                                <option value="17">17 группа: F, Cl, Br, I, At (галогены)</option>
                                <option value="18">18 группа: He, Ne, Ar, Kr, Xe, Rn (инертные)</option>
                                <option value="3">3 группа: Sc, Y, La, Ac</option>
                                <option value="4">4 группа: Ti, Zr, Hf, Rf</option>
                                <option value="5">5 группа: V, Nb, Ta, Db</option>
                                <option value="6">6 группа: Cr, Mo, W, Sg</option>
                                <option value="7">7 группа: Mn, Tc, Re, Bh</option>
                                <option value="8">8 группа: Fe, Ru, Os, Hs</option>
                                <option value="9">9 группа: Co, Rh, Ir, Mt</option>
                                <option value="10">10 группа: Ni, Pd, Pt, Ds</option>
                                <option value="11">11 группа: Cu, Ag, Au, Rg</option>
                                <option value="12">12 группа: Zn, Cd, Hg, Cn</option>
                                <option value="lan">Лантаноиды (La-Lu)</option>
                                <option value="act">Актиноиды (Ac-Lr)</option>
                            </select>
                        </div>
                    </div>

                    <!-- Кнопки -->
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <button id="analyzeBtn" class="btn btn-analyze text-white rounded-pill px-5 py-2" disabled>
                            <i class="fas fa-microscope"></i> Классифицировать
                        </button>
                        <div class="stat-panel text-white"><i class="fas fa-chart-line me-1"></i> <span id="statsLabel">Нет данных</span></div>
                        <button id="exportBtn" class="btn btn-outline-primary rounded-pill px-4 py-1" disabled>
                            <i class="fas fa-download"></i> Скачать Excel
                        </button>
                    </div>

                    <!-- Таблица результатов -->
                    <div class="table-container">
                        <table class="table table-hover table-bordered mb-0">
                            <thead>
                                <tr><th style="width: 100px;">🤖 Определено</th><th style="width: 80px;">📌 Эталон</th><th>📄 Текст вопроса</th></tr>
                            </thead>
                            <tbody id="resultsBody">
                                <tr><td colspan="3" class="text-center text-secondary py-5">Выберите файл и нажмите "Классифицировать"</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="text-secondary pt-3 mt-2 small">🔬 База: все группы периодической системы + ключевые слова</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== ВСЕ ГРУППЫ ЭЛЕМЕНТОВ ====================
    const GROUPS = {
        "1": { elements: ["H","Li","Na","K","Rb","Cs","Fr"], keywords: ["водород","литий","натрий","калий","рубидий","цезий","щелочной","naoh","koh","гидроксид"] },
        "2": { elements: ["Be","Mg","Ca","Sr","Ba","Ra"], keywords: ["бериллий","магний","кальций","стронций","барий","радий","щелочноземельный","cao","mgo","bacl2"] },
        "13": { elements: ["B","Al","Ga","In","Tl"], keywords: ["бор","алюминий","галлий","индий","таллий","al2o3","al(oh)3","глинозем"] },
        "14": { elements: ["C","Si","Ge","Sn","Pb"], keywords: ["углерод","кремний","германий","олово","свинец","carbon","silicon","цианамид","цианид","циановая","дициан","cn-","hcn","co2","sio2","карбид"] },
        "15": { elements: ["N","P","As","Sb","Bi"], keywords: ["азот","фосфор","мышьяк","сурьма","висмут","фосфин","фосфиновая","фосфоновая","аммиак","нитрат","фосфат","фосфорная"] },
        "16": { elements: ["O","S","Se","Te","Po"], keywords: ["кислород","сера","селен","теллур","оксид","сульфид","сульфат","h2so4","so2"] },
        "17": { elements: ["F","Cl","Br","I","At"], keywords: ["фтор","хлор","бром","йод","галоген","фторид","хлорид","бромид","иодид"] },
        "18": { elements: ["He","Ne","Ar","Kr","Xe","Rn"], keywords: ["гелий","неон","аргон","криптон","ксенон","радон","инертный","благородный"] },
        "3": { elements: ["Sc","Y","La","Ac"], keywords: ["скандий","иттрий","лантан","актиний"] },
        "4": { elements: ["Ti","Zr","Hf","Rf"], keywords: ["титан","цирконий","гафний"] },
        "5": { elements: ["V","Nb","Ta","Db"], keywords: ["ванадий","ниобий","тантал"] },
        "6": { elements: ["Cr","Mo","W","Sg"], keywords: ["хром","молибден","вольфрам"] },
        "7": { elements: ["Mn","Tc","Re","Bh"], keywords: ["марганец","технеций","рений","перманганат","kmno4"] },
        "8": { elements: ["Fe","Ru","Os","Hs"], keywords: ["железо","рутений","осмий","iron","феррум","ржавчина"] },
        "9": { elements: ["Co","Rh","Ir","Mt"], keywords: ["кобальт","родий","иридий"] },
        "10": { elements: ["Ni","Pd","Pt","Ds"], keywords: ["никель","палладий","платина"] },
        "11": { elements: ["Cu","Ag","Au","Rg"], keywords: ["медь","серебро","золото","copper","silver","gold"] },
        "12": { elements: ["Zn","Cd","Hg","Cn"], keywords: ["цинк","кадмий","ртуть","mercury"] },
        "lan": { elements: ["La","Ce","Pr","Nd","Pm","Sm","Eu","Gd","Tb","Dy","Ho","Er","Tm","Yb","Lu"], keywords: ["лантан","церий","празеодим","неодим","самарий","европий","гадолиний","тербий","диспрозий","гольмий","эрбий","тулий","иттербий","лютеций"] },
        "act": { elements: ["Ac","Th","Pa","U","Np","Pu","Am","Cm","Bk","Cf","Es","Fm","Md","No","Lr"], keywords: ["актиний","торий","протактиний","уран","нептуний","плутоний","америций","кюрий"] }
    };

    const ELEMENT_NAMES = {
        "H":"водород","He":"гелий","Li":"литий","Be":"бериллий","B":"бор","C":"углерод","N":"азот","O":"кислород","F":"фтор",
        "Na":"натрий","Mg":"магний","Al":"алюминий","Si":"кремний","P":"фосфор","S":"сера","Cl":"хлор","K":"калий","Ca":"кальций",
        "Fe":"железо","Cu":"медь","Zn":"цинк","Ag":"серебро","Au":"золото","Hg":"ртуть","Pb":"свинец","Sn":"олово","Pt":"платина"
    };

    function detectGroupFromText(text) {
        if (!text) return null;
        const lower = text.toLowerCase();
        let best = null, bestScore = 0;
        for (let [gid, grp] of Object.entries(GROUPS)) {
            let score = 0;
            for (let kw of grp.keywords) {
                if (lower.includes(kw)) score += kw.length + 5;
            }
            if (score > bestScore) { bestScore = score; best = gid; }
        }
        return best;
    }

    function selectElementInGroup(groupId, text) {
        if (!groupId || !GROUPS[groupId]) return "?";
        const lower = text.toLowerCase();
        for (let elem of GROUPS[groupId].elements) {
            let name = ELEMENT_NAMES[elem];
            if (name && lower.includes(name)) return elem;
        }
        return GROUPS[groupId].elements[0];
    }

    function detectElement(question, forcedGroup) {
        if (!question || question.trim() === "") return "?";
        let group = (forcedGroup && forcedGroup !== "auto") ? forcedGroup : detectGroupFromText(question);
        if (!group) return "?";
        return selectElementInGroup(group, question);
    }

    // Глобальные переменные
    let sheetData = [];
    let questionColIdx = 0;
    let answerColIdx = -1;
    let resultsList = [];

    // DOM
    const fileInput = document.getElementById('excelFileInput');
    const uploadStatus = document.getElementById('uploadStatus');
    const questionCol = document.getElementById('questionCol');
    const answerCol = document.getElementById('answerCol');
    const groupSelect = document.getElementById('groupSelect');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const exportBtn = document.getElementById('exportBtn');
    const resultsBody = document.getElementById('resultsBody');
    const statsLabel = document.getElementById('statsLabel');

    // ОБРАБОТЧИК ЗАГРУЗКИ ФАЙЛА (прямой, без конфликтов)
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        uploadStatus.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> Чтение ${file.name}...`;
        
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                
                if (!rows || rows.length === 0) throw new Error("Файл пуст");
                sheetData = rows;
                uploadStatus.innerHTML = `<i class="fas fa-check-circle text-success"></i> Загружено: ${rows.length} строк (${file.name})`;
                
                // Заполнение селекторов
                const maxCols = rows[0] ? rows[0].length : 0;
                questionCol.innerHTML = '<option value="auto">🧠 Авто (поиск вопросов)</option>';
                answerCol.innerHTML = '<option value="none">📌 Нет эталона</option>';
                
                for (let i = 0; i < maxCols; i++) {
                    let header = (rows[0][i] && rows[0][i].toString().trim()) ? rows[0][i].toString().trim() : `Столбец ${i+1}`;
                    if (header.length > 40) header = header.slice(0,37)+'...';
                    questionCol.innerHTML += `<option value="${i}">${i+1}: ${header}</option>`;
                    answerCol.innerHTML += `<option value="${i}">${i+1}: ${header}</option>`;
                }
                
                questionCol.disabled = false;
                answerCol.disabled = false;
                analyzeBtn.disabled = false;
                exportBtn.disabled = true;
                
                // Автоопределение столбца с вопросами
                let bestQ = 0, bestQScore = -1;
                for (let c = 0; c < maxCols; c++) {
                    let score = 0;
                    for (let r = 0; r < Math.min(rows.length, 40); r++) {
                        let cell = rows[r][c];
                        if (cell && typeof cell === 'string' && cell.length > 15) {
                            score += 2;
                            let low = cell.toLowerCase();
                            if (low.includes("какой") || low.includes("элемент")) score += 5;
                            if (low.includes("реакция") || low.includes("кислота")) score += 3;
                        }
                    }
                    if (score > bestQScore) { bestQScore = score; bestQ = c; }
                }
                questionColIdx = bestQ;
                questionCol.value = bestQ.toString();
                
                // Поиск эталонного столбца (где есть символы N, P, C и т.д.)
                let bestA = -1;
                for (let c = 0; c < maxCols; c++) {
                    let matches = 0;
                    for (let r = 1; r < Math.min(rows.length, 15); r++) {
                        let cell = rows[r][c];
                        if (cell && typeof cell === 'string' && /^[A-Z][a-z]?$/.test(cell.trim())) matches++;
                    }
                    if (matches > 3) { bestA = c; break; }
                }
                answerColIdx = bestA;
                if (bestA >= 0) answerCol.value = bestA.toString();
                
                // Превью
                let previewHtml = '';
                for (let i = 0; i < Math.min(rows.length, 20); i++) {
                    let q = rows[i][bestQ] ? String(rows[i][bestQ]) : "";
                    let short = q.length > 90 ? q.slice(0,87)+'…' : (q || "—");
                    previewHtml += `<tr><td class="text-center"><span class="elem-badge bg-secondary">?</span><td class="text-center">—<td class="text-light">${escapeHtml(short)}</tr>`;
                }
                resultsBody.innerHTML = previewHtml || `<tr><td colspan="3" class="text-center">Нет данных</tr>`;
                statsLabel.innerText = "Файл загружен";
                
            } catch(err) {
                uploadStatus.innerHTML = `<span class="text-danger">Ошибка: ${err.message}</span>`;
            }
        };
        reader.onerror = () => uploadStatus.innerHTML = '<span class="text-danger">Ошибка чтения</span>';
        reader.readAsArrayBuffer(file);
    });

    // КЛАССИФИКАЦИЯ
    function runClassification() {
        if (!sheetData.length) { alert("Сначала загрузите файл!"); return; }
        
        let qVal = questionCol.value;
        let targetQ = (qVal === "auto") ? 0 : parseInt(qVal, 10);
        if (isNaN(targetQ)) targetQ = 0;
        questionColIdx = targetQ;
        
        let aVal = answerCol.value;
        let targetA = (aVal === "none") ? -1 : parseInt(aVal, 10);
        answerColIdx = targetA;
        
        let selectedGroup = groupSelect.value;
        let correct = 0, valid = 0;
        let htmlRows = '';
        resultsList = [];
        
        for (let i = 0; i < sheetData.length; i++) {
            let question = sheetData[i][targetQ] ? String(sheetData[i][targetQ]) : "";
            let detected = detectElement(question, selectedGroup);
            let expected = (targetA >= 0 && sheetData[i][targetA]) ? String(sheetData[i][targetA]).trim() : "";
            
            let isCorrect = false;
            if (expected && expected.length > 0) {
                isCorrect = (detected === expected);
                if (isCorrect) correct++;
                valid++;
            }
            
            resultsList.push({ detected, expected, question });
            
            let badgeClass = "elem-badge";
            if (expected) badgeClass += (detected === expected) ? " elem-correct" : " elem-wrong";
            
            let shortQ = question.length > 100 ? question.slice(0,97)+'…' : (question || "(пусто)");
            htmlRows += `<table>
                <td class="text-center"><span class="${badgeClass}">${escapeHtml(detected)}</span></td>
                <td class="text-center text-info">${escapeHtml(expected || "—")}</td>
                <td class="text-light">${escapeHtml(shortQ)}</td>
            </tr>`;
        }
        
        resultsBody.innerHTML = htmlRows;
        let accuracy = valid > 0 ? Math.round((correct / valid) * 100) : 0;
        statsLabel.innerHTML = `🎯 Точность: ${correct}/${valid} (${accuracy}%) | Всего: ${resultsList.length}`;
        exportBtn.disabled = false;
    }

    // ЭКСПОРТ
    function exportToExcel() {
        if (!resultsList.length) { alert("Нет данных для экспорта. Сначала выполните классификацию."); return; }
        const excelRows = [["Определенный элемент", "Эталон", "Текст вопроса"]];
        for (let item of resultsList) {
            excelRows.push([item.detected, item.expected || "", item.question]);
        }
        const ws = XLSX.utils.aoa_to_sheet(excelRows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Классификация");
        XLSX.writeFile(wb, `хим_классификация_${new Date().toISOString().slice(0,19)}.xlsx`);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    // КНОПКИ
    analyzeBtn.addEventListener('click', runClassification);
    exportBtn.addEventListener('click', exportToExcel);
    
    // Начальное состояние
    questionCol.disabled = true;
    answerCol.disabled = true;
    analyzeBtn.disabled = true;
    exportBtn.disabled = true;
    uploadStatus.innerHTML = '<span class="text-secondary">Выберите файл Excel...</span>';
</script>
</body>
</html>
