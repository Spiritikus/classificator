<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХимЭлемент v3 — точная классификация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        body {
            background: linear-gradient(145deg, #0a1820 0%, #07131c 100%);
            font-family: 'Segoe UI', system-ui;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(18, 30, 40, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 1.8rem;
            border: 1px solid rgba(46, 204, 113, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .header-accent {
            background: linear-gradient(95deg, #0f2f28, #0a241f);
            border-radius: 1.8rem 1.8rem 0 0;
            border-bottom: 2px solid #2ecc71;
        }
        .upload-box {
            border: 2px dashed #2ecc71;
            border-radius: 1.2rem;
            background: rgba(46, 204, 113, 0.05);
            transition: 0.2s;
            cursor: pointer;
        }
        .upload-box:hover {
            background: rgba(46, 204, 113, 0.12);
            border-color: #58e68c;
        }
        .btn-success-glow {
            background: linear-gradient(95deg, #1e6f3f, #0f5330);
            border: none;
            font-weight: 600;
        }
        .btn-success-glow:hover {
            background: linear-gradient(95deg, #2c8e55, #166c3e);
            transform: translateY(-1px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }
        .table-scroll {
            max-height: 58vh;
            overflow-y: auto;
            border-radius: 1rem;
            background: #0e1820;
        }
        .table {
            color: #eef2ff;
        }
        .table thead th {
            background: #11242e;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid #2ecc71;
        }
        .elem-badge {
            background: #2c7a47;
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: bold;
            min-width: 70px;
            display: inline-block;
            text-align: center;
        }
        .elem-unknown {
            background: #5a626e;
        }
        .stat-pill {
            background: #0d2c27;
            border-radius: 50px;
            padding: 6px 18px;
        }
        select, option {
            background-color: #1e3a33 !important;
            color: white !important;
            border-color: #2e8b57;
        }
        .debug-message {
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="container py-4 py-md-5">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-9">
            <div class="glass-panel overflow-hidden">
                <div class="header-accent p-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h2 class="text-white fw-bold mb-0"><i class="fas fa-atom me-2 text-success"></i> ХимЭлемент PRO</h2>
                            <p class="text-success-emphasis small mt-1">Автоопределение химического элемента по тексту вопроса</p>
                        </div>
                        <i class="fas fa-flask fa-3x text-success opacity-50"></i>
                    </div>
                </div>

                <div class="p-4 p-md-5">
                    <!-- ЗАГРУЗКА ФАЙЛА - максимально простой и надёжный вариант -->
                    <div class="mb-4">
                        <div id="uploadBox" class="upload-box p-4 text-center">
                            <i class="fas fa-file-excel fa-3x text-success mb-2"></i>
                            <h5 class="text-white">Нажмите, чтобы выбрать файл Excel</h5>
                            <p class="text-secondary small">Поддерживаются .xlsx, .xls (любые вопросы по химии)</p>
                            <input type="file" id="fileInput" accept=".xlsx, .xls, .xlsm" style="display: none;">
                            <button id="triggerFileBtn" class="btn btn-success-glow text-white rounded-pill px-4">
                                <i class="fas fa-folder-open"></i> Выбрать файл
                            </button>
                            <div id="uploadStatus" class="mt-3 small fw-bold"></div>
                        </div>
                    </div>

                    <!-- Управление -->
                    <div class="row g-3 mb-4 align-items-end bg-black bg-opacity-25 p-3 rounded-4">
                        <div class="col-md-5">
                            <label class="form-label text-white fw-semibold"><i class="fas fa-columns"></i> Столбец с вопросами</label>
                            <select id="columnSelect" class="form-select bg-dark text-white" disabled>
                                <option value="auto">🧠 Автовыбор (умный)</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-white fw-semibold"><i class="fas fa-microscope"></i> Классификация</label>
                            <button id="classifyButton" class="btn btn-success-glow text-white w-100 py-2 rounded-pill" disabled>
                                <i class="fas fa-magic"></i> Определить элементы
                            </button>
                        </div>
                        <div class="col-md-3 text-md-end">
                            <div class="stat-pill text-white d-inline-flex align-items-center">
                                <i class="fas fa-chart-line me-1"></i> <span id="statsLabel">Нет данных</span>
                            </div>
                        </div>
                    </div>

                    <!-- Таблица -->
                    <div class="table-scroll mb-3">
                        <table class="table table-hover table-bordered mb-0">
                            <thead>
                                <tr><th style="width: 130px;">🔬 Элемент</th><th>📄 Текст вопроса</th></tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr><td colspan="2" class="text-center text-secondary py-5">Загрузите Excel-файл</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <button id="downloadButton" class="btn btn-outline-success rounded-pill px-4 py-2" disabled>
                            <i class="fas fa-download"></i> Скачать Excel с результатами
                        </button>
                        <div class="small text-secondary"><i class="fas fa-brain"></i> Анализируются названия элементов: калий, барий, хлор, бром, фтор и др.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ===================== БАЗА ЭЛЕМЕНТОВ =====================
    const elementRecognition = [
        { sym: "K",  names: ["калий", "калия", "калием", "калиевая", "калиевый", "potassium"] },
        { sym: "Ba", names: ["барий", "бария", "барием", "barium"] },
        { sym: "Cl", names: ["хлор", "хлора", "хлором", "хлорид", "хлорат", "chlorine"] },
        { sym: "Br", names: ["бром", "брома", "бромом", "бромид", "bromine"] },
        { sym: "F",  names: ["фтор", "фтора", "фтором", "фторид", "fluorine"] },
        { sym: "I",  names: ["йод", "иод", "йода", "иода", "иодид", "iodine"] },
        { sym: "O",  names: ["кислород", "кислорода", "oxygen"] },
        { sym: "H",  names: ["водород", "водорода", "hydrogen"] },
        { sym: "Na", names: ["натрий", "натрия", "sodium"] },
        { sym: "Mg", names: ["магний", "магния", "magnesium"] },
        { sym: "Ca", names: ["кальций", "кальция", "calcium"] },
        { sym: "Al", names: ["алюминий", "алюминия", "aluminium"] },
        { sym: "Fe", names: ["железо", "железа", "iron"] },
        { sym: "Cu", names: ["медь", "меди", "copper"] },
        { sym: "Zn", names: ["цинк", "цинка", "zinc"] },
        { sym: "Ag", names: ["серебро", "серебра", "silver"] },
        { sym: "Au", names: ["золото", "золота", "gold"] },
        { sym: "Hg", names: ["ртуть", "ртути", "mercury"] },
        { sym: "Pb", names: ["свинец", "свинца", "lead"] },
        { sym: "Pt", names: ["платина", "платины", "platinum"] },
        { sym: "N",  names: ["азот", "азота", "nitrogen"] },
        { sym: "P",  names: ["фосфор", "фосфора", "phosphorus"] },
        { sym: "S",  names: ["сера", "серы", "sulfur"] },
        { sym: "Si", names: ["кремний", "кремния", "silicon"] }
    ];

    // Функция очистки текста от формул LaTeX и \ce{}
    function cleanText(raw) {
        if (!raw || typeof raw !== "string") return "";
        let text = raw.toLowerCase();
        // удаляем \ce{...}
        text = text.replace(/\\ce\{[^}]*\}/g, ' ');
        text = text.replace(/\\\[.*?\\\]/g, ' ');
        text = text.replace(/\$[^$]*\$/g, ' ');
        text = text.replace(/[_{}\[\]\^]/g, ' ');
        text = text.replace(/\s+/g, ' ').trim();
        return text;
    }

    // Главный детектор элемента по вопросу
    function detectElement(question) {
        const cleaned = cleanText(question);
        if (cleaned.length < 3) return "?";
        
        let bestMatch = { sym: "?", score: 0 };
        
        for (let el of elementRecognition) {
            for (let name of el.names) {
                const nameLower = name.toLowerCase();
                // ищем как отдельное слово (высший приоритет)
                const wordBoundary = new RegExp(`\\b${escapeRegex(nameLower)}\\b`, 'i');
                if (wordBoundary.test(cleaned)) {
                    let score = 100 + nameLower.length * 2;
                    if (score > bestMatch.score) {
                        bestMatch.score = score;
                        bestMatch.sym = el.sym;
                    }
                } else if (cleaned.includes(nameLower)) {
                    // частичное вхождение
                    let score = 40 + nameLower.length;
                    if (score > bestMatch.score) {
                        bestMatch.score = score;
                        bestMatch.sym = el.sym;
                    }
                }
            }
        }
        
        // Если нашли с хорошим весом — возвращаем
        if (bestMatch.score >= 40) {
            return bestMatch.sym;
        }
        
        // Специальные контексты для вашего файла (барий, калий)
        if (cleaned.includes("bacl2") || cleaned.includes("ba(clo3)2")) return "Ba";
        if (cleaned.includes("kcl") || cleaned.includes("kbro3") || cleaned.includes("kclo3") || cleaned.includes("[k]")) return "K";
        
        return "?";
    }
    
    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
    
    // ========== ГЛОБАЛЬНЫЕ ДАННЫЕ ==========
    let sheetRows = [];          // все строки из Excel
    let questionsColumn = 0;
    let classifiedCache = [];    // [{element, question}]
    
    // DOM элементы
    const fileInput = document.getElementById('fileInput');
    const triggerBtn = document.getElementById('triggerFileBtn');
    const uploadBox = document.getElementById('uploadBox');
    const uploadStatus = document.getElementById('uploadStatus');
    const columnSelect = document.getElementById('columnSelect');
    const classifyBtn = document.getElementById('classifyButton');
    const downloadBtn = document.getElementById('downloadButton');
    const tableBody = document.getElementById('tableBody');
    const statsLabel = document.getElementById('statsLabel');
    
    // ========== ЗАГРУЗКА ФАЙЛА (упрощённая, без конфликтов) ==========
    function handleFile(file) {
        if (!file) {
            uploadStatus.innerHTML = '<span class="text-warning">Файл не выбран</span>';
            return;
        }
        uploadStatus.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> Чтение ${file.name}...`;
        
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: "" });
                
                if (!rows || rows.length === 0) throw new Error("Файл пуст");
                sheetRows = rows;
                uploadStatus.innerHTML = `<i class="fas fa-check-circle text-success"></i> Загружено: ${rows.length} строк (${file.name})`;
                
                // Заполняем select
                const maxCols = rows[0] ? rows[0].length : 1;
                columnSelect.innerHTML = '<option value="auto">🧠 Автовыбор (лучший столбец)</option>';
                for (let i = 0; i < maxCols; i++) {
                    let header = (rows[0][i] && rows[0][i].toString().trim()) ? rows[0][i].toString().trim() : `Столбец ${i+1}`;
                    if (header.length > 45) header = header.slice(0,42)+'...';
                    columnSelect.innerHTML += `<option value="${i}">${i+1}: ${header}</option>`;
                }
                columnSelect.disabled = false;
                classifyBtn.disabled = false;
                downloadBtn.disabled = true;
                
                // Автоопределение столбца с вопросами
                const bestCol = autoDetectQuestionColumn(rows);
                questionsColumn = bestCol >= 0 ? bestCol : 0;
                if (bestCol >= 0) columnSelect.value = bestCol.toString();
                else columnSelect.value = "auto";
                
                // Предпоказ
                renderPreviewTable();
                statsLabel.innerText = "Готов к анализу";
            } catch(err) {
                console.error(err);
                uploadStatus.innerHTML = `<span class="text-danger">Ошибка: ${err.message}</span>`;
                sheetRows = [];
                classifyBtn.disabled = true;
                columnSelect.disabled = true;
            }
        };
        reader.onerror = () => uploadStatus.innerHTML = '<span class="text-danger">Ошибка при чтении файла</span>';
        reader.readAsArrayBuffer(file);
    }
    
    // Автоопределение лучшего столбца (где есть осмысленные вопросы)
    function autoDetectQuestionColumn(rows) {
        if (!rows.length) return 0;
        const colCount = rows[0] ? rows[0].length : 1;
        let bestIdx = 0, maxScore = -1;
        for (let col = 0; col < colCount; col++) {
            let score = 0;
            for (let r = 0; r < Math.min(rows.length, 50); r++) {
                let cell = rows[r][col];
                if (cell && typeof cell === 'string' && cell.trim().length > 8) {
                    score += 2;
                    let low = cell.toLowerCase();
                    if (low.includes("температура") || low.includes("реакция") || low.includes("свойства")) score += 3;
                    if (low.includes("какой") || low.includes("элемент")) score += 4;
                }
            }
            if (score > maxScore) { maxScore = score; bestIdx = col; }
        }
        return bestIdx;
    }
    
    function renderPreviewTable() {
        if (!sheetRows.length) return;
        let col = questionsColumn;
        let html = '';
        const limit = Math.min(sheetRows.length, 400);
        for (let i = 0; i < limit; i++) {
            let qText = (sheetRows[i][col] != null) ? String(sheetRows[i][col]) : "";
            let short = qText.length > 110 ? qText.slice(0,107)+'…' : (qText || "—");
            html += `<tr><td class="text-center"><span class="elem-badge elem-unknown bg-secondary">?</span></td><td class="text-light">${escapeHtml(short)}</td></tr>`;
        }
        tableBody.innerHTML = html || `<tr><td colspan="2" class="text-center">Нет данных</td></tr>`;
    }
    
    // КЛАССИФИКАЦИЯ
    function runClassification() {
        if (!sheetRows.length) {
            alert("Сначала загрузите Excel файл!");
            return;
        }
        
        let selectedValue = columnSelect.value;
        let targetCol;
        if (selectedValue === "auto") {
            targetCol = autoDetectQuestionColumn(sheetRows);
        } else {
            targetCol = parseInt(selectedValue, 10);
        }
        if (isNaN(targetCol)) targetCol = 0;
        questionsColumn = targetCol;
        
        let detected = 0;
        let htmlRows = '';
        classifiedCache = [];
        
        for (let i = 0; i < sheetRows.length; i++) {
            let question = (sheetRows[i][targetCol] != null) ? String(sheetRows[i][targetCol]) : "";
            let element = detectElement(question);
            if (element !== "?") detected++;
            classifiedCache.push({ element: element, question: question });
            let shortQ = question.length > 115 ? question.slice(0,112)+'…' : (question || "(пустой вопрос)");
            let badgeClass = (element === "?") ? "elem-unknown bg-secondary" : "";
            htmlRows += `<tr>
                            <td class="text-center"><span class="elem-badge ${badgeClass}">${escapeHtml(element)}</span></td>
                            <td class="text-light">${escapeHtml(shortQ)}</td>
                         </tr>`;
        }
        tableBody.innerHTML = htmlRows;
        let percent = sheetRows.length ? Math.round((detected / sheetRows.length) * 100) : 0;
        statsLabel.innerHTML = `🎯 распознано: ${detected} / ${sheetRows.length} (${percent}%)`;
        downloadBtn.disabled = false;
    }
    
    // Скачивание результата
    function downloadResult() {
        if (!classifiedCache.length) {
            alert("Нет классифицированных данных. Сначала выполните классификацию.");
            return;
        }
        const excelData = [["Химический элемент (символ)", "Текст вопроса"]];
        for (let item of classifiedCache) {
            excelData.push([item.element, item.question]);
        }
        const ws = XLSX.utils.aoa_to_sheet(excelData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Классификация элементов");
        const filename = `химия_элементы_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`;
        XLSX.writeFile(wb, filename);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }
    
    // ========== НАСТРОЙКА СОБЫТИЙ (без конфликтов) ==========
    triggerBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        fileInput.click();
    });
    
    uploadBox.addEventListener('click', function(e) {
        if (e.target === uploadBox || uploadBox.contains(e.target) && e.target !== triggerBtn) {
            fileInput.click();
        }
    });
    
    fileInput.addEventListener('change', function(e) {
        if (e.target.files && e.target.files.length > 0) {
            handleFile(e.target.files[0]);
        } else {
            uploadStatus.innerHTML = '<span class="text-secondary">Файл не выбран</span>';
        }
    });
    
    // Drag & drop
    uploadBox.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadBox.style.borderColor = '#58e68c';
        uploadBox.style.background = 'rgba(46, 204, 113, 0.12)';
    });
    uploadBox.addEventListener('dragleave', () => {
        uploadBox.style.borderColor = '#2ecc71';
        uploadBox.style.background = 'rgba(46, 204, 113, 0.05)';
    });
    uploadBox.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadBox.style.borderColor = '#2ecc71';
        uploadBox.style.background = 'rgba(46, 204, 113, 0.05)';
        if (e.dataTransfer.files.length) {
            handleFile(e.dataTransfer.files[0]);
        }
    });
    
    classifyBtn.addEventListener('click', runClassification);
    downloadBtn.addEventListener('click', downloadResult);
    
    // Инициализация
    columnSelect.disabled = true;
    classifyBtn.disabled = true;
    downloadBtn.disabled = true;
    uploadStatus.innerHTML = '<span class="text-secondary">Ожидание файла...</span>';
</script>
</body>
</html>
